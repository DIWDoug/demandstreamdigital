    <!-- Deferred third-party scripts - loaded after first paint to reduce critical chain depth -->
    <!-- Note: reCAPTCHA is now loaded dynamically by useRecaptcha hook only when forms need it -->
    <script>
      (function() {
        function loadThirdPartyScripts() {
          // jQuery stub for GTM tags that expect jQuery
          if (!window.jQuery) {
            window.jQuery = function() {
              return {
                ready: function() {},
                on: function() {},
                off: function() {},
                find: function() { return []; },
                each: function() {},
                ajax: function() {},
                get: function() {},
                post: function() {}
              };
            };
            window.$ = window.jQuery;
          }

          // Google Tag Manager (reCAPTCHA moved to dynamic loading in useRecaptcha.tsx)
          (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
          new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
          j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
          'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
          })(window,document,'script','dataLayer','GTM-MTRZV5G');
        }
        
        // Load after first paint using requestIdleCallback with fallback
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadThirdPartyScripts, { timeout: 2000 });
        } else {
          window.addEventListener('load', loadThirdPartyScripts);
        }
      })();
    </script>
